<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>똥끼몽 키우기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      background:#fef6ff;
      font-family:'Jua',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:0 0 40px;
      max-width:420px;
      margin:0 auto;
    }

    /* 상단 헤더 */
    .top-header{
      width:100%;
      background:linear-gradient(135deg,#ffb3d9,#b3d9ff);
      padding:10px 14px 8px;
      border-bottom:3px solid #fff;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }
    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }
    .game-title{
      font-family:'Press Start 2P',monospace;
      font-size:9px;
      color:#fff;
      text-shadow:1px 1px 0 #ff69b4, 2px 2px 0 #ff69b480;
    }
    .day-badge{
      background:#fff;
      border-radius:999px;
      padding:3px 10px;
      font-size:12px;
      color:#ff69b4;
      font-weight:700;
      box-shadow:0 2px 6px rgba(255,105,180,0.3);
    }
    .stage-name{
      font-size:11px;
      color:#fff;
      text-align:center;
      margin-bottom:6px;
      text-shadow:1px 1px 0 rgba(0,0,0,0.1);
    }

    /* 스탯 바 */
    .stats-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px 8px;
    }
    .stat-item{display:flex;align-items:center;gap:4px;}
    .stat-icon{font-size:11px;width:16px;text-align:center;}
    .stat-bar-bg{
      flex:1;
      height:7px;
      background:rgba(255,255,255,0.5);
      border-radius:999px;
      overflow:hidden;
    }
    .stat-bar-fill{
      height:100%;
      border-radius:999px;
      transition:width 0.4s ease;
    }
    .bar-hp{background:linear-gradient(90deg,#ff6b9d,#ff99bb);}
    .bar-skill{background:linear-gradient(90deg,#6bb5ff,#99ccff);}
    .bar-fame{background:linear-gradient(90deg,#ffd700,#ffec6e);}
    .bar-fan{background:linear-gradient(90deg,#b86bff,#d4a0ff);}
    .stat-num{font-size:9px;color:#fff;width:18px;text-align:right;}

    /* 돈 표시 */
    .money-bar{
      text-align:right;
      font-size:11px;
      color:#fff;
      margin-top:4px;
      text-shadow:1px 1px 0 rgba(0,0,0,0.1);
    }

    /* 메인 게임 화면 */
    .game-screen{
      width:100%;
      position:relative;
      overflow:hidden;
    }
    #bgCanvas{
      display:block;
      width:100%;
      image-rendering:pixelated;
    }
    #charCanvas{
      position:absolute;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      image-rendering:pixelated;
      width:72px;
      height:96px;
    }

    /* 메시지 박스 */
    .msg-area{
      width:100%;
      background:#fff;
      border-top:3px solid #ffb3d9;
      border-bottom:3px solid #ffb3d9;
      padding:10px 14px;
      min-height:60px;
      font-size:13px;
      color:#555;
      line-height:1.7;
    }
    .msg-area .em{color:#ff69b4;font-weight:700;}
    .msg-area .good{color:#4caf50;font-weight:700;}
    .msg-area .bad{color:#f44336;font-weight:700;}

    /* 가사 입력 */
    .lyrics-area{
      width:100%;
      background:#fff9ff;
      border-bottom:3px solid #ffb3d9;
      padding:8px 14px;
      display:none;
      flex-direction:column;
      gap:6px;
    }
    .lyrics-area.open{display:flex;}
    .lyrics-label{font-size:12px;color:#ff69b4;}
    .lyrics-input{
      width:100%;
      padding:8px 10px;
      border:2px solid #ffb3d9;
      border-radius:10px;
      font-family:'Jua',sans-serif;
      font-size:12px;
      color:#333;
      resize:none;
      min-height:60px;
      outline:none;
    }
    .lyrics-input:focus{border-color:#ff69b4;}
    .lyrics-btns{display:flex;gap:6px;justify-content:flex-end;}
    .lyrics-cancel{
      padding:5px 12px;
      border-radius:999px;
      border:2px solid #ddd;
      background:#fff;
      font-family:'Jua',sans-serif;
      font-size:11px;
      cursor:pointer;
      color:#999;
    }
    .lyrics-save{
      padding:5px 14px;
      border-radius:999px;
      border:none;
      background:linear-gradient(135deg,#ff69b4,#ff99cc);
      font-family:'Jua',sans-serif;
      font-size:11px;
      cursor:pointer;
      color:#fff;
      box-shadow:0 2px 6px rgba(255,105,180,0.4);
    }

    /* 액션 버튼 */
    .actions-wrap{
      width:100%;
      background:#fff;
      padding:10px 10px 14px;
    }
    .actions-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }
    .act-btn{
      background:#fff;
      border:2.5px solid #ffb3d9;
      border-radius:14px;
      padding:8px 4px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      cursor:pointer;
      transition:all 0.15s;
      box-shadow:0 2px 6px rgba(255,179,217,0.3);
    }
    .act-btn:hover{
      background:#fff0f7;
      transform:translateY(-2px);
      box-shadow:0 4px 12px rgba(255,105,180,0.3);
    }
    .act-btn:active{transform:scale(0.95);}
    .act-btn.special{border-color:#ffd700;box-shadow:0 2px 6px rgba(255,215,0,0.4);}
    .act-btn.special:hover{background:#fffde7;}
    .act-btn.blue{border-color:#b3d9ff;}
    .act-btn.blue:hover{background:#f0f8ff;}
    .act-icon{font-size:22px;}
    .act-label{font-size:9px;color:#888;text-align:center;line-height:1.3;}
    .act-btn:disabled,.act-btn.disabled{opacity:0.35;cursor:not-allowed;transform:none;}

    /* 진급 버튼 */
    .promote-wrap{
      width:100%;
      padding:0 10px 8px;
      background:#fff;
      display:none;
    }
    .promote-wrap.show{display:block;}
    .promote-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#ff69b4,#b86bff);
      color:#fff;
      font-family:'Jua',sans-serif;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 4px 14px rgba(184,107,255,0.4);
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 4px 14px rgba(184,107,255,0.4);}
      50%{box-shadow:0 4px 20px rgba(184,107,255,0.7);}
    }

    /* 게임오버 / 엔딩 */
    .overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:100;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .overlay.show{display:flex;}
    .overlay-box{
      background:#fff;
      border-radius:20px;
      padding:24px 20px;
      text-align:center;
      max-width:320px;
      width:100%;
      box-shadow:0 10px 40px rgba(0,0,0,0.2);
    }
    .overlay-emoji{font-size:48px;margin-bottom:10px;}
    .overlay-title{font-size:18px;color:#ff69b4;margin-bottom:8px;}
    .overlay-msg{font-size:12px;color:#777;line-height:1.8;margin-bottom:16px;}
    .overlay-btn{
      padding:10px 24px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,#ff69b4,#ff99cc);
      color:#fff;
      font-family:'Jua',sans-serif;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(255,105,180,0.4);
    }
    .overlay-btn.gold{background:linear-gradient(135deg,#ffd700,#ffec6e);color:#333;}
  </style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="top-header">
  <div class="title-row">
    <div class="game-title">똥끼몽 키우기</div>
    <div class="day-badge" id="dayBadge">D+1</div>
  </div>
  <div class="stage-name" id="stageName">📚 학생 — 방구석 래퍼 지망생</div>
  <div class="stats-grid">
    <div class="stat-item">
      <span class="stat-icon">❤️</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill bar-hp" id="bar-hp" style="width:100%"></div></div>
      <span class="stat-num" id="num-hp">100</span>
    </div>
    <div class="stat-item">
      <span class="stat-icon">🎤</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill bar-skill" id="bar-skill" style="width:0%"></div></div>
      <span class="stat-num" id="num-skill">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-icon">🌟</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill bar-fame" id="bar-fame" style="width:0%"></div></div>
      <span class="stat-num" id="num-fame">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-icon">👥</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill bar-fan" id="bar-fan" style="width:0%"></div></div>
      <span class="stat-num" id="num-fan">0</span>
    </div>
  </div>
  <div class="money-bar" id="moneyBar">💰 0원</div>
</div>

<!-- 게임 화면 -->
<div class="game-screen">
  <canvas id="bgCanvas" width="420" height="220"></canvas>
  <canvas id="charCanvas" width="18" height="24"></canvas>
</div>

<!-- 메시지 -->
<div class="msg-area" id="msgArea">
  <span class="em">[ 똥끼몽의 이야기 시작! ]</span><br>
  넌 평범한 고딩이지만... 래퍼가 될 운명이야. 🎤
</div>

<!-- 가사 입력창 -->
<div class="lyrics-area" id="lyricsArea">
  <div class="lyrics-label">✏️ 가사 써봐 — 네 이야기를 담아!</div>
  <textarea class="lyrics-input" id="lyricsInput" placeholder="여기에 가사를 써봐...&#10;예) 난 고딩인데 왜 이렇게 랩이 하고 싶지"></textarea>
  <div class="lyrics-btns">
    <button class="lyrics-cancel" onclick="closeLyrics()">취소</button>
    <button class="lyrics-save" onclick="saveLyrics()">저장 🎵</button>
  </div>
</div>

<!-- 액션 버튼 -->
<div class="actions-wrap">
  <div class="actions-grid" id="actionsGrid"></div>
</div>

<!-- 진급 버튼 -->
<div class="promote-wrap" id="promoteWrap">
  <button class="promote-btn" onclick="promote()" id="promoteBtn">✨ 다음 단계로 진급! ✨</button>
</div>

<!-- 게임오버 -->
<div class="overlay" id="gameoverOverlay">
  <div class="overlay-box">
    <div class="overlay-emoji">💀</div>
    <div class="overlay-title">랩을 포기했다...</div>
    <div class="overlay-msg" id="gameoverMsg"></div>
    <button class="overlay-btn" onclick="restart()">다시 시작하기</button>
  </div>
</div>

<!-- 엔딩 -->
<div class="overlay" id="endingOverlay">
  <div class="overlay-box">
    <div class="overlay-emoji">👑</div>
    <div class="overlay-title" id="endingTitle"></div>
    <div class="overlay-msg" id="endingMsg"></div>
    <button class="overlay-btn gold" onclick="restart()">처음부터 다시</button>
  </div>
</div>

function initState() {

// ========================

function drawChar() {
  const cv = document.getElementById('charCanvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,18,24);
  const d = CHAR_DATA[S.stage];
  for(let y=0;y<d.pixels.length;y++){
    for(let x=0;x<d.pixels[y].length;x++){
      const c = d.pixels[y][x];
      if(c && d.colors[c]){
        ctx.fillStyle = d.colors[c];
        ctx.fillRect(x,y,1,1);
      }
    }
  }
}

// 배경
// ========================
let bgF = 0;
const BG_THEMES = [
  // 0: 학생방 (하늘+파스텔)
  { sky:'#d4f0ff', floor:'#f0e8d0', wall:'#e8f4ff' },
  // 1: 홍대 클럽 (보라+핑크)
  { sky:'#1a0a2e', floor:'#2a1040', wall:'#0f0020' },
  // 2: 쇼미 무대 (노랑+스포트)
  { sky:'#1a1a0a', floor:'#2a2a10', wall:'#0f0f05' },
  // 3: 스튜디오 (민트)
  { sky:'#0a2020', floor:'#0f2a2a', wall:'#051515' },
  // 4: 콘서트홀 (골드)
  { sky:'#1a1000', floor:'#2a1a00', wall:'#0f0800' },
];

function drawBg() {
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  bgF++;
  ctx.clearRect(0,0,W,H);

  const t = BG_THEMES[S.stage];

  if(S.stage === 0){
    // 학생방
    ctx.fillStyle = '#d4f0ff';
    ctx.fillRect(0,0,W,H);
    // 벽지 패턴
    ctx.fillStyle = '#c8e8f8';
    for(let i=0;i<8;i++) ctx.fillRect(40+i*50,20,2,H-40);
    // 창문
    ctx.fillStyle = '#fff';
    ctx.fillRect(20,20,80,60);
    ctx.fillStyle = '#87ceeb';
    ctx.fillRect(24,24,72,52);
    // 햇빛
    ctx.fillStyle = '#fffc6e';
    ctx.fillRect(50,10,20,20);
    ctx.globalAlpha = 0.3+Math.sin(bgF*0.03)*0.1;
    ctx.fillStyle = '#fffc6e';
    ctx.fillRect(40,30,40,H);
    ctx.globalAlpha = 1;
    // 책상
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(W-130,H-60,120,12);
    ctx.fillRect(W-120,H-48,10,30);
    ctx.fillRect(W-30,H-48,10,30);
    // 모니터
    ctx.fillStyle = '#333';
    ctx.fillRect(W-110,H-95,70,38);
    ctx.fillStyle = '#00aaff';
    ctx.fillRect(W-107,H-92,64,32);
    // 바닥
    ctx.fillStyle = '#e8d8b0';
    ctx.fillRect(0,H-25,W,25);
    // 카펫
    ctx.fillStyle = '#ffb3d9';
    ctx.fillRect(W/2-60,H-26,120,4);

  } else if(S.stage === 1){
    // 홍대 클럽
    ctx.fillStyle = '#0a0010';
    ctx.fillRect(0,0,W,H);
    // 네온사인
    const neons=['#ff2df3','#00c8ff','#fffc6e','#b8ff3c'];
    for(let i=0;i<4;i++){
      ctx.globalAlpha=0.7+Math.sin(bgF*0.05+i*1.2)*0.2;
      ctx.fillStyle=neons[i];
      ctx.fillRect(15+i*100,8,80,14);
      ctx.globalAlpha=0.07;
      ctx.fillRect(15+i*100,0,80,H);
      ctx.globalAlpha=1;
    }
    // 조명 빔
    ctx.globalAlpha=0.08+Math.sin(bgF*0.04)*0.03;
    ctx.fillStyle='#fff';
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(70+i*140,0);
      ctx.lineTo(20+i*140,H);
      ctx.lineTo(120+i*140,H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha=1;
    // 바닥
    ctx.fillStyle='#1a0a20';
    ctx.fillRect(0,H-20,W,20);

  } else if(S.stage === 2){
    // 쇼미 무대
    ctx.fillStyle='#050508';
    ctx.fillRect(0,0,W,H);
    // 스포트라이트
    ctx.globalAlpha=0.2+Math.sin(bgF*0.02)*0.05;
    ctx.fillStyle='#fffc6e';
    ctx.beginPath();
    ctx.moveTo(W/2,0);
    ctx.lineTo(W/2-100,H);
    ctx.lineTo(W/2+100,H);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha=1;
    // SMTM 로고
    ctx.fillStyle='#fffc6e';
    ctx.font='bold 11px monospace';
    ctx.fillText('SHOW ME THE MONEY',20,22);
    // 무대
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(0,H-22,W,22);
    ctx.fillStyle='#00c8ff';
    ctx.fillRect(0,H-23,W,2);
    // 관중 실루엣
    for(let i=0;i<14;i++){
      ctx.fillStyle='#333';
      ctx.fillRect(8+i*30,H-40,14,18);
      ctx.fillStyle='#444';
      ctx.fillRect(12+i*30,H-50,8,12);
    }

  } else if(S.stage === 3){
    // 스튜디오
    ctx.fillStyle='#0a1a15';
    ctx.fillRect(0,0,W,H);
    // 믹서
    ctx.fillStyle='#1a2a25';
    ctx.fillRect(10,H-55,160,45);
    for(let i=0;i<10;i++){
      const h=10+Math.sin(bgF*0.1+i)*8;
      ctx.fillStyle='#00ffaa';
      ctx.globalAlpha=0.8;
      ctx.fillRect(18+i*15,H-50,10,h);
      ctx.globalAlpha=1;
    }
    // 야경 창문
    ctx.fillStyle='#0a0a20';
    ctx.fillRect(W-160,10,140,80);
    for(let i=0;i<24;i++){
      ctx.fillStyle=i%3===0?'#fffc6e':'#fff';
      ctx.globalAlpha=Math.random()>0.1?0.8:0.2;
      ctx.fillRect(W-148+(i%6)*22,20+Math.floor(i/6)*18,8,8);
    }
    ctx.globalAlpha=1;
    // 바닥
    ctx.fillStyle='#0f1f1a';
    ctx.fillRect(0,H-20,W,20);

  } else {
    // 레전드 콘서트
    ctx.fillStyle='#050300';
    ctx.fillRect(0,0,W,H);
    // 레이저
    const lc=['#ff2df3','#00c8ff','#fffc6e','#b8ff3c'];
    for(let i=0;i<8;i++){
      ctx.strokeStyle=lc[i%4];
      ctx.globalAlpha=0.5;
      ctx.lineWidth=1.5;
      const angle=bgF*0.015+i*Math.PI/4;
      ctx.beginPath();
      ctx.moveTo(W/2,H/3);
      ctx.lineTo(W/2+Math.cos(angle)*W,H/3+Math.sin(angle)*H);
      ctx.stroke();
      ctx.globalAlpha=1;
    }
    // 무대
    ctx.fillStyle='#1a1500';
    ctx.fillRect(0,H-22,W,22);
    ctx.fillStyle='#ffd700';
    ctx.fillRect(0,H-23,W,2);
    // 관중
    for(let i=0;i<16;i++){
      ctx.fillStyle=i%2===0?'#2a2000':'#1a1500';
      ctx.fillRect(6+i*26,H-42,16,20);
      ctx.fillStyle='#3a3010';
      ctx.fillRect(10+i*26,H-52,10,12);
      // 응원봉
      ctx.fillStyle=lc[i%4];
      ctx.globalAlpha=0.6+Math.sin(bgF*0.08+i)*0.3;
      ctx.fillRect(14+i*26,H-62,3,12);
      ctx.globalAlpha=1;
    }
  }
  requestAnimationFrame(drawBg);
}

// ========================

function updateUI() {
  document.getElementById('dayBadge').textContent = 'D+'+S.day;
  document.getElementById('stageName').textContent = STAGES[S.stage].name;

  ['hp','skill','fame','fan'].forEach(k=>{
    const v = Math.max(0,Math.min(100,S[k]));
    document.getElementById('bar-'+k).style.width = v+'%';
    document.getElementById('num-'+k).textContent = Math.floor(v);
  });
  document.getElementById('moneyBar').textContent = '💰 '+S.money.toLocaleString()+'원';

  renderActions();
  checkPromote();
}

function renderActions() {
  const grid = document.getElementById('actionsGrid');
  const acts = ACTIONS_BY_STAGE[S.stage];
  grid.innerHTML = acts.map(a=>`
    <button class="act-btn ${a.color||''}" onclick="doAction('${a.fn}')">
      <span class="act-icon">${a.icon}</span>
      <span class="act-label">${a.label}</span>
    </button>
  `).join('');
}

function checkPromote() {
  const req = STAGES[S.stage].req;
  const wrap = document.getElementById('promoteWrap');
  const btn = document.getElementById('promoteBtn');
  if(!req){ wrap.classList.remove('show'); return; }
  const ok = Object.entries(req).every(([k,v])=>S[k]>=v);
  wrap.classList.toggle('show', ok);
  if(ok) btn.textContent = `✨ ${STAGES[S.stage].next} ✨`;
}

function setMsg(html) {
  document.getElementById('msgArea').innerHTML = html;
}

// ========================
// 액션
// ========================
function doAction(fn) {
  if(S.dead||S.ended) return;
  if(fn==='lyrics'){ openLyrics(); return; }

  const eff = ACTION_EFFECTS[fn];
  if(!eff) return;

  // 돈 부족
  if(eff.money && eff.money < 0 && S.money + eff.money < 0){
    setMsg('💸 <span class="bad">돈이 부족해! 공연이나 다른 걸 먼저 해봐.</span>');
    return;
  }
  // 가사 없이 곡 완성
  if(fn==='makeSong' && !lyricsWritten){
    setMsg('✏️ <span class="bad">가사를 먼저 써야 해! 가사 쓰기를 눌러봐.</span>');
    return;
  }

  // 효과 적용
  Object.entries(eff).forEach(([k,v])=>{
    if(k==='isEat') return;
    if(k==='money') S[k] = Math.max(0, S[k]+v);
    else S[k] = Math.max(0, Math.min(100, S[k]+v));
  });

  // 밥 먹기 카운트 (하루 시스템)
  if(eff.isEat){
    S.eatCount++;
    if(S.eatCount >= 2){ S.day++; S.eatCount=0; randomDayEvent(); }
  }

  // 곡 완성 후 가사 초기화
  if(fn==='makeSong') lyricsWritten = false;

  // 랜덤 보너스 (8%)
  let bonus = '';
  if(Math.random()<0.08 && fn!=='sleep' && fn!=='eat'){
    S.fame = Math.min(100, S.fame+5);
    bonus = '<br><span class="good">✨ 운이 좋았다! 명성 +5 보너스!</span>';
  }

  const msgs = MSGS[fn]||['...'];
  setMsg(msgs[Math.floor(Math.random()*msgs.length)] + bonus);

  if(S.hp<=0){ gameOver(); return; }
  if(S.stage===4 && S.fame>=95 && S.fan>=75){ triggerEnding(); return; }

  drawChar();
  updateUI();
}

// 랜덤 이벤트
function randomDayEvent(){
  const events = [
    { msg:'📰 <span class="good">인터넷에 네 랩이 화제가 됐다! 명성 +5</span>', stat:'fame', val:5 },
    { msg:'😴 <span class="bad">밤새 연습하다 탈진... 체력 -10</span>', stat:'hp', val:-10 },
    { msg:'🎵 <span class="good">새 비트를 발견! 실력 +3</span>', stat:'skill', val:3 },
    { msg:'👥 <span class="good">SNS 팔로워가 늘었다! 팬 +5</span>', stat:'fan', val:5 },
    { msg:'💸 <span class="bad">지갑을 잃어버렸다... 돈 -1000</span>', stat:'money', val:-1000 },
  ];
  if(Math.random()<0.4){
    const e = events[Math.floor(Math.random()*events.length)];
    if(e.stat==='money') S.money = Math.max(0,S.money+e.val);
    else S[e.stat] = Math.max(0,Math.min(100,S[e.stat]+e.val));
    setTimeout(()=>setMsg('📅 <span class="em">D+'+S.day+' 새로운 하루!</span><br>'+e.msg), 300);
  }
}

// ========================
// 가사 쓰기
// ========================
function openLyrics(){
  const area = document.getElementById('lyricsArea');
  area.classList.add('open');
  document.getElementById('lyricsInput').focus();
}
function closeLyrics(){
  document.getElementById('lyricsArea').classList.remove('open');
}
function saveLyrics(){
  const text = document.getElementById('lyricsInput').value.trim();
  if(!text){ alert('가사를 써봐!'); return; }
  S.lyrics = text;
  lyricsWritten = true;
  closeLyrics();
  S.skill = Math.min(100, S.skill+3);
  S.fame = Math.min(100, S.fame+2);
  setMsg('✏️ <span class="em">가사 완성!</span><br>"'+text.slice(0,40)+(text.length>40?'...':'')+'"<br><span class="good">실력 +3, 명성 +2</span>');
  updateUI();
}

// ========================
// 진급
// ========================
function promote(){
  S.stage++;
  S.hp = Math.min(100, S.hp+20);
  lyricsWritten = false;
  const msgs=[
    '🎤 드디어 <span class="em">언더 래퍼</span>가 됐다!<br>홍대 클럽 무대에 서는 날이 왔어.',
    '🏆 <span class="em">쇼미더머니</span> 참가!<br>이게 기회야. 전국에 이름을 알려.',
    '🎵 <span class="em">메이저 데뷔!</span><br>드디어 세상이 메이슨홈을 알아봐.',
    '👑 <span class="em">레전드 등극!</span><br>이제 넌 한국 힙합의 역사가 됐어.',
  ];
  setMsg(msgs[S.stage-1]);
  drawChar();
  updateUI();
}

// ========================
// 게임오버 / 엔딩
// ========================
function gameOver(){
  S.dead = true;
  const msgs=[
    '체력이 0이 됐다...\n더 이상 랩을 할 수 없어.\n\n메이슨홈은 결국 랩을 포기하고\n편의점 알바를 시작했다.',
    '몸이 버티질 못했다...\n꿈은 꿈으로 남았다.\n\nD+'+S.day+'일 만에 포기.',
  ];
  document.getElementById('gameoverMsg').innerHTML = msgs[Math.floor(Math.random()*msgs.length)].replace(/\n/g,'<br>');
  document.getElementById('gameoverOverlay').classList.add('show');
}

function triggerEnding(){
  S.ended = true;
  document.getElementById('endingTitle').textContent = '메이슨홈, 레전드가 되다.';
  document.getElementById('endingMsg').innerHTML =
    '쇼미더머니부터 시작해서<br>이제 한국 힙합을 대표하는 이름이 됐다.<br><br>'+
    '총 '+S.day+'일의 여정.<br>'+
    '💰 총 자산: '+S.money.toLocaleString()+'원<br>'+
    '👥 팬: '+Math.floor(S.fan)+'점<br><br>'+
    (S.lyrics?'"'+S.lyrics.slice(0,50)+'"':'');
  document.getElementById('endingOverlay').classList.add('show');
}

function restart(){
  document.getElementById('gameoverOverlay').classList.remove('show');
  document.getElementById('endingOverlay').classList.remove('show');
  initState();
  drawChar();
  updateUI();
  setMsg('<span class="em">[ 다시 시작! ]</span><br>포기하지 마. 다시 해보자. 🔥');
}

// ========================
// 시작
// ========================
initState();
drawChar();
updateUI();
drawBg();
</script>
</body>
