<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>똥끼몽 키우기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      background:#1a1a1a;
      font-family:'Jua',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .game-wrap{
      width:100%;
      max-width:480px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      position:relative;
      background:#000;
      overflow:hidden;
    }

    /* 스탯 바 */
    .stat-bar{
      position:absolute;
      top:0;left:0;right:0;
      z-index:20;
      background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
      padding:10px 14px 20px;
    }
    .stat-row-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:6px;
    }
    .stage-badge{
      font-size:11px;
      color:#fff;
      background:rgba(90,138,90,0.8);
      padding:3px 10px;
      border-radius:999px;
    }
    .day-badge{
      font-size:11px;
      color:#fffc6e;
    }
    .stats-mini{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .stat-mini-item{
      display:flex;
      align-items:center;
      gap:3px;
      font-size:10px;
      color:#fff;
    }
    .stat-mini-bar{
      width:40px;
      height:5px;
      background:rgba(255,255,255,0.2);
      border-radius:999px;
      overflow:hidden;
    }
    .stat-mini-fill{
      height:100%;
      border-radius:999px;
      transition:width 0.4s ease;
    }
    .fill-hp{background:#ff6b9d;}
    .fill-skill{background:#6bb5ff;}
    .fill-fame{background:#ffd700;}
    .fill-fan{background:#b86bff;}

    /* 배경 + 캐릭터 */
    .scene-bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      transition:background-image 0.5s ease;
    }
    .scene-bg-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
    }
    .scene-char{
      position:absolute;
      bottom:180px;
      left:50%;
      transform:translateX(-50%);
      max-height:55%;
      max-width:80%;
      object-fit:contain;
      z-index:5;
      transition:opacity 0.3s ease;
      filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    }

    /* 대화창 */
    .dialog-area{
      position:absolute;
      bottom:0;left:0;right:0;
      z-index:10;
      padding:12px 14px 16px;
    }

    /* 말풍선 (플레이어) */
    .player-bubble{
      display:none;
      justify-content:flex-end;
      margin-bottom:8px;
    }
    .player-bubble.show{display:flex;}
    .player-bubble-inner{
      background:#ffeb3b;
      border-radius:18px 18px 4px 18px;
      padding:8px 14px;
      font-size:13px;
      color:#333;
      max-width:70%;
      position:relative;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }

    /* 캐릭터 대화창 */
    .char-dialog{
      background:rgba(255,253,230,0.95);
      border-radius:16px;
      padding:12px 14px;
      margin-bottom:10px;
      min-height:80px;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
      position:relative;
    }
    .char-name{
      font-size:12px;
      color:#5a8a5a;
      font-weight:700;
      margin-bottom:4px;
    }
    .char-text{
      font-size:14px;
      color:#333;
      line-height:1.6;
      min-height:40px;
    }
    .next-indicator{
      position:absolute;
      bottom:8px;right:12px;
      font-size:16px;
      color:#5a8a5a;
      animation:bounce 1s infinite;
      cursor:pointer;
    }
    @keyframes bounce{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(4px);}
    }

    /* 선택지 */
    .choices-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .choice-btn{
      background:rgba(255,255,255,0.92);
      border:2px solid #c8e6c9;
      border-radius:12px;
      padding:10px 14px;
      font-family:'Jua',sans-serif;
      font-size:13px;
      color:#333;
      cursor:pointer;
      text-align:left;
      transition:all 0.15s;
      box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }
    .choice-btn:hover{
      background:#e8f5e9;
      border-color:#5a8a5a;
      transform:translateY(-1px);
    }
    .choice-btn:active{transform:scale(0.98);}

    /* 로딩 */
    .loading-screen{
      position:absolute;
      inset:0;
      background:#1a2a1a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:100;
      gap:16px;
    }
    .loading-title{
      font-size:20px;
      color:#5a8a5a;
      text-shadow:0 0 10px rgba(90,138,90,0.5);
    }
    .loading-sub{font-size:13px;color:#888;}
    .loading-dot{
      display:flex;gap:6px;
    }
    .loading-dot span{
      width:8px;height:8px;
      background:#5a8a5a;
      border-radius:50%;
      animation:dotBounce 1.2s infinite;
    }
    .loading-dot span:nth-child(2){animation-delay:0.2s;}
    .loading-dot span:nth-child(3){animation-delay:0.4s;}
    @keyframes dotBounce{
      0%,100%{transform:translateY(0);opacity:0.3;}
      50%{transform:translateY(-8px);opacity:1;}
    }

    /* 시작 화면 */
    .start-screen{
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,#1a2a1a,#0a1a0a);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:90;
      gap:16px;
      padding:24px;
    }
    .start-title{
      font-size:24px;
      color:#5a8a5a;
      text-shadow:0 0 20px rgba(90,138,90,0.6);
      text-align:center;
    }
    .start-sub{font-size:13px;color:#888;text-align:center;line-height:1.7;}
    .start-btn{
      padding:14px 32px;
      background:linear-gradient(135deg,#5a8a5a,#4a7a4a);
      border:none;
      border-radius:999px;
      color:#fff;
      font-family:'Jua',sans-serif;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 4px 20px rgba(90,138,90,0.4);
    }
    .start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(90,138,90,0.6);}

    /* 스탯 변화 토스트 */
    .stat-toast{
      position:absolute;
      top:80px;right:14px;
      z-index:50;
      display:flex;
      flex-direction:column;
      gap:4px;
      pointer-events:none;
    }
    .toast-item{
      background:rgba(0,0,0,0.7);
      color:#fff;
      font-size:11px;
      padding:3px 10px;
      border-radius:999px;
      animation:toastUp 2s forwards;
    }
    @keyframes toastUp{
      0%{opacity:1;transform:translateY(0);}
      70%{opacity:1;}
      100%{opacity:0;transform:translateY(-30px);}
    }

    /* 게임오버 / 엔딩 */
    .result-screen{
      display:none;
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.85);
      z-index:80;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .result-screen.show{display:flex;}
    .result-box{
      background:#fff;
      border-radius:20px;
      padding:28px 24px;
      text-align:center;
      max-width:320px;
      width:100%;
    }
    .result-emoji{font-size:52px;margin-bottom:12px;}
    .result-title{font-size:18px;color:#333;margin-bottom:8px;}
    .result-msg{font-size:12px;color:#888;line-height:1.8;margin-bottom:20px;}
    .result-btn{
      padding:10px 24px;
      border:none;
      border-radius:999px;
      background:#5a8a5a;
      color:#fff;
      font-family:'Jua',sans-serif;
      font-size:14px;
      cursor:pointer;
    }

    /* 타이핑 효과 커서 */
    .typing-cursor{
      display:inline-block;
      width:2px;height:14px;
      background:#5a8a5a;
      margin-left:2px;
      animation:blink 0.7s infinite;
      vertical-align:middle;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  </style>
</head>
<body>
<div class="game-wrap" id="gameWrap">

  <!-- 로딩 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-title">🌿 똥끼몽 키우기</div>
    <div class="loading-dot"><span></span><span></span><span></span></div>
    <div class="loading-sub">불러오는 중...</div>
  </div>

  <!-- 시작 화면 -->
  <div class="start-screen" id="startScreen" style="display:none;">
    <div class="start-title">🌿 똥끼몽 키우기</div>
    <div class="start-sub">메이슨홈의 래퍼 성장 스토리<br>당신의 선택이 그의 운명을 바꿔요</div>
    <button class="start-btn" onclick="startGame()">▶ 시작하기</button>
  </div>

  <!-- 배경 -->
  <div class="scene-bg" id="sceneBg"></div>
  <div class="scene-bg-overlay"></div>

  <!-- 캐릭터 -->
  <img class="scene-char" id="sceneChar" src="" style="display:none;" />

  <!-- 스탯 바 -->
  <div class="stat-bar" id="statBar" style="display:none;">
    <div class="stat-row-top">
      <div class="stage-badge" id="stageBadge">📚 학생</div>
      <div class="day-badge" id="dayBadge">D+1</div>
    </div>
    <div class="stats-mini">
      <div class="stat-mini-item">
        ❤️
        <div class="stat-mini-bar"><div class="stat-mini-fill fill-hp" id="fill-hp" style="width:100%"></div></div>
      </div>
      <div class="stat-mini-item">
        🎤
        <div class="stat-mini-bar"><div class="stat-mini-fill fill-skill" id="fill-skill" style="width:0%"></div></div>
      </div>
      <div class="stat-mini-item">
        🌟
        <div class="stat-mini-bar"><div class="stat-mini-fill fill-fame" id="fill-fame" style="width:0%"></div></div>
      </div>
      <div class="stat-mini-item">
        👥
        <div class="stat-mini-bar"><div class="stat-mini-fill fill-fan" id="fill-fan" style="width:0%"></div></div>
      </div>
      <div class="stat-mini-item" id="money-display" style="color:#fffc6e;">💰 <span id="moneyText">0</span></div>
    </div>
  </div>

  <!-- 스탯 토스트 -->
  <div class="stat-toast" id="statToast"></div>

  <!-- 대화창 -->
  <div class="dialog-area" id="dialogArea" style="display:none;">
    <div class="player-bubble" id="playerBubble">
      <div class="player-bubble-inner" id="playerBubbleText"></div>
    </div>
    <div class="char-dialog" id="charDialog">
      <div class="char-name" id="charName">메이슨홈</div>
      <div class="char-text" id="charText"></div>
      <div class="next-indicator" id="nextIndicator" onclick="nextDialogue()" style="display:none;">▼</div>
    </div>
    <div class="choices-wrap" id="choicesWrap"></div>
  </div>

  <!-- 게임오버 -->
  <div class="result-screen" id="gameoverScreen">
    <div class="result-box">
      <div class="result-emoji">💀</div>
      <div class="result-title">랩을 포기했다...</div>
      <div class="result-msg" id="gameoverMsg"></div>
      <button class="result-btn" onclick="restartGame()">다시 시작</button>
    </div>
  </div>

  <!-- 엔딩 -->
  <div class="result-screen" id="endingScreen">
    <div class="result-box">
      <div class="result-emoji">👑</div>
      <div class="result-title" id="endingTitle">레전드가 되다</div>
      <div class="result-msg" id="endingMsg"></div>
      <button class="result-btn" style="background:#ffd700;color:#333;" onclick="restartGame()">처음부터</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const _supabase = supabase.createClient(
    'https://wsfplnugfazrqylupjjb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZnBsbnVnZmF6cnF5bHVwampiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTMxMTYsImV4cCI6MjA5MTI4OTExNn0.Aa8nzxI182YgUWU3GoJ4kjiqq-nUeUfY7JxG27BlQYY'
  );

  // ========================
  // 게임 상태
  // ========================
  let allScenes = [], allDialogues = [], allChoices = [];
  let currentScene = null;
  let currentDialogues = [];
  let currentDlgIdx = 0;
  let isTyping = false;
  let typingTimeout = null;

  let stats = { hp:100, skill:0, fame:0, fan:0, money:0, day:1 };

  // ========================
  // 초기화
  // ========================
  async function init() {
    const { data: scenes } = await _supabase.from('scenes').select('*').order('order');
    const { data: dialogues } = await _supabase.from('dialogues').select('*').order('scene_id').order('order');
    const { data: choices } = await _supabase.from('choices').select('*').order('dialogue_id');
    allScenes = scenes || [];
    allDialogues = dialogues || [];
    allChoices = choices || [];

    document.getElementById('loadingScreen').style.display = 'none';

    if (!allScenes.length) {
      document.getElementById('startScreen').style.display = 'flex';
      document.querySelector('.start-sub').textContent = '아직 스토리가 없어요.\n어드민에서 씬을 추가해줘요!';
      return;
    }
    document.getElementById('startScreen').style.display = 'flex';
  }

  function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('statBar').style.display = 'block';
    document.getElementById('dialogArea').style.display = 'block';
    loadScene(allScenes[0].id);
  }

  function restartGame() {
    stats = { hp:100, skill:0, fame:0, fan:0, money:0, day:1 };
    document.getElementById('gameoverScreen').classList.remove('show');
    document.getElementById('endingScreen').classList.remove('show');
    document.getElementById('playerBubble').classList.remove('show');
    updateStatUI();
    loadScene(allScenes[0].id);
  }

  // ========================
  // 씬 로드
  // ========================
  function loadScene(sceneId) {
    currentScene = allScenes.find(s => s.id === sceneId);
    if (!currentScene) { showEnding(); return; }

    // 배경
    const bg = document.getElementById('sceneBg');
    bg.style.backgroundImage = currentScene.background_url ? `url(${currentScene.background_url})` : 'linear-gradient(135deg,#1a2a1a,#0a1a0a)';

    // 캐릭터
    const char = document.getElementById('sceneChar');
    if (currentScene.character_url) {
      char.src = currentScene.character_url;
      char.style.display = 'block';
    } else {
      char.style.display = 'none';
    }

    // 스테이지 배지
    document.getElementById('stageBadge').textContent = stageEmoji(currentScene.stage) + ' ' + currentScene.stage;

    // 대사 로드
    currentDialogues = allDialogues.filter(d => d.scene_id === sceneId).sort((a,b) => a.order - b.order);
    currentDlgIdx = 0;

    document.getElementById('playerBubble').classList.remove('show');
    document.getElementById('choicesWrap').innerHTML = '';
    document.getElementById('nextIndicator').style.display = 'none';

    if (currentDialogues.length) showDialogue(0);
  }

  function stageEmoji(stage) {
    const m = {'학생':'📚','언더':'🎤','쇼미':'🏆','메이저':'🎵','레전드':'👑'};
    return m[stage] || '🌿';
  }

  // ========================
  // 대사 표시
  // ========================
  function showDialogue(idx) {
    if (idx >= currentDialogues.length) return;
    currentDlgIdx = idx;
    const dlg = currentDialogues[idx];
    const dlgChoices = allChoices.filter(c => c.dialogue_id === dlg.id);
    const isLast = idx === currentDialogues.length - 1;

    document.getElementById('charName').textContent = dlg.speaker || '나레이션';
    document.getElementById('choicesWrap').innerHTML = '';
    document.getElementById('nextIndicator').style.display = 'none';

    // 타이핑 효과
    typeText(dlg.text, () => {
      if (dlgChoices.length) {
        showChoices(dlgChoices);
      } else if (isLast) {
        // 마지막 대사인데 선택지 없으면 씬 끝
        document.getElementById('nextIndicator').style.display = 'none';
      } else {
        document.getElementById('nextIndicator').style.display = 'block';
      }
    });
  }

  function typeText(text, callback) {
    const el = document.getElementById('charText');
    el.innerHTML = '';
    isTyping = true;
    let i = 0;
    clearTimeout(typingTimeout);

    function type() {
      if (i < text.length) {
        el.innerHTML = text.slice(0, i+1) + '<span class="typing-cursor"></span>';
        i++;
        typingTimeout = setTimeout(type, 35);
      } else {
        el.innerHTML = text;
        isTyping = false;
        if (callback) callback();
      }
    }
    type();
  }

  function nextDialogue() {
    if (isTyping) {
      // 타이핑 스킵
      clearTimeout(typingTimeout);
      const dlg = currentDialogues[currentDlgIdx];
      document.getElementById('charText').textContent = dlg.text;
      isTyping = false;
      const dlgChoices = allChoices.filter(c => c.dialogue_id === dlg.id);
      if (dlgChoices.length) {
        showChoices(dlgChoices);
      } else {
        document.getElementById('nextIndicator').style.display = 'block';
      }
      return;
    }
    showDialogue(currentDlgIdx + 1);
  }

  // 화면 탭으로 다음 대사
  document.getElementById('charDialog').addEventListener('click', (e) => {
    if (e.target.id === 'nextIndicator') return;
    if (document.getElementById('choicesWrap').children.length > 0) return;
    nextDialogue();
  });

  // ========================
  // 선택지
  // ========================
  function showChoices(choices) {
    const wrap = document.getElementById('choicesWrap');
    wrap.innerHTML = choices.map(c => `
      <button class="choice-btn" onclick="selectChoice(${c.id})">
        ${c.text}
      </button>
    `).join('');
  }

  function selectChoice(choiceId) {
    const choice = allChoices.find(c => c.id === choiceId);
    if (!choice) return;

    // 선택한 내용 말풍선으로 표시
    const bubble = document.getElementById('playerBubble');
    document.getElementById('playerBubbleText').textContent = choice.text;
    bubble.classList.add('show');

    // 선택지 숨기기
    document.getElementById('choicesWrap').innerHTML = '';

    // 스탯 효과
    applyStats(choice);

    // 체력 0 체크
    if (stats.hp <= 0) {
      setTimeout(() => {
        document.getElementById('gameoverMsg').innerHTML =
          `D+${stats.day}일 만에 포기했다...<br><br>메이슨홈은 결국 편의점 알바를 시작했다.`;
        document.getElementById('gameoverScreen').classList.add('show');
      }, 800);
      return;
    }

    // 다음 씬으로 이동
    setTimeout(() => {
      bubble.classList.remove('show');
      if (choice.next_scene_id) {
        loadScene(choice.next_scene_id);
      } else {
        // 다음 씬 없으면 엔딩
        showEnding();
      }
    }, 800);
  }

  // ========================
  // 스탯
  // ========================
  function applyStats(choice) {
    const effects = [];
    if (choice.skill_effect) { stats.skill = Math.min(100, Math.max(0, stats.skill + choice.skill_effect)); effects.push(`🎤${choice.skill_effect>0?'+':''}${choice.skill_effect}`); }
    if (choice.fame_effect) { stats.fame = Math.min(100, Math.max(0, stats.fame + choice.fame_effect)); effects.push(`🌟${choice.fame_effect>0?'+':''}${choice.fame_effect}`); }
    if (choice.fan_effect) { stats.fan = Math.min(100, Math.max(0, stats.fan + choice.fan_effect)); effects.push(`👥${choice.fan_effect>0?'+':''}${choice.fan_effect}`); }
    if (choice.money_effect) { stats.money = Math.max(0, stats.money + choice.money_effect); effects.push(`💰${choice.money_effect>0?'+':''}${choice.money_effect}`); }
    if (choice.hp_effect) { stats.hp = Math.min(100, Math.max(0, stats.hp + choice.hp_effect)); effects.push(`❤️${choice.hp_effect>0?'+':''}${choice.hp_effect}`); }

    updateStatUI();
    if (effects.length) showToast(effects);
  }

  function updateStatUI() {
    document.getElementById('fill-hp').style.width = stats.hp + '%';
    document.getElementById('fill-skill').style.width = stats.skill + '%';
    document.getElementById('fill-fame').style.width = stats.fame + '%';
    document.getElementById('fill-fan').style.width = stats.fan + '%';
    document.getElementById('moneyText').textContent = stats.money.toLocaleString() + '원';
    document.getElementById('dayBadge').textContent = 'D+' + stats.day;
  }

  function showToast(effects) {
    const toast = document.getElementById('statToast');
    effects.forEach((e, i) => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'toast-item';
        div.textContent = e;
        toast.appendChild(div);
        setTimeout(() => div.remove(), 2000);
      }, i * 100);
    });
  }

  // ========================
  // 엔딩
  // ========================
  function showEnding() {
    document.getElementById('endingTitle').textContent = stats.skill >= 80 ? '👑 레전드가 되다!' : '🎤 래퍼의 이야기';
    document.getElementById('endingMsg').innerHTML =
      `메이슨홈의 여정이 끝났어요.<br><br>` +
      `🎤 실력: ${Math.floor(stats.skill)} · 🌟 명성: ${Math.floor(stats.fame)}<br>` +
      `👥 팬: ${Math.floor(stats.fan)} · 💰 ${stats.money.toLocaleString()}원<br><br>` +
      `D+${stats.day}일간의 이야기`;
    document.getElementById('endingScreen').classList.add('show');
  }

  // ========================
  // 시작
  // ========================
  init();
</script>
</body>
</html>
